<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vist — Reset Password</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F0D0C;
      color: #F6EFE6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1A1715;
      border: 0.5px solid rgba(255,230,210,0.10);
      border-radius: 28px;
      padding: 48px 32px 40px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 30px;
    }
    .icon.loading { background: rgba(255,106,61,0.14); }
    .icon.error   { background: rgba(255,80,80,0.14); }
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,106,61,0.2);
      border-top-color: #FF6A3D;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      color: rgba(246,239,230,0.55);
      line-height: 1.55;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-block;
      background: #FF6A3D;
      color: #1A0B05;
      text-decoration: none;
      border-radius: 999px;
      padding: 14px 28px;
      font-weight: 700;
      font-size: 15px;
      transition: opacity 0.15s;
      margin: 6px 4px;
    }
    .btn:active { opacity: 0.85; }
    .btn.secondary {
      background: rgba(255,106,61,0.12);
      color: #FF6A3D;
    }

    #state-loading  { display: block; }
    #state-fallback { display: none; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Loading / Redirecting -->
    <div id="state-loading">
      <div class="icon loading"><div class="spinner"></div></div>
      <h1>Opening Vist…</h1>
      <p>You're being redirected to the app.</p>
    </div>

    <!-- Fallback: app not installed -->
    <div id="state-fallback">
      <div class="icon error">📲</div>
      <h1>App not found</h1>
      <p>Please make sure the Vist app is installed on your device.</p>
      <a href="https://apps.apple.com/app/id com.stoylab.vist" class="btn">App Store</a>
      <a href="https://play.google.com/store/apps/details?id=com.stoylab.vist" class="btn secondary">Google Play</a>
    </div>

  </div>

  <script>
    // Supabase iki farklı format kullanabilir:
    // PKCE flow:     ?code=XXXX
    // Implicit flow: #access_token=XXXX&refresh_token=YYYY&type=recovery
    // Her ikisini de olduğu gibi deep link'e ekle.

    var query = window.location.search;  // "?code=XXXX" veya ""
    var hash  = window.location.hash;   // "#access_token=...&type=recovery" veya ""

    var deepLink = 'vist://reset-password' + query + hash;

    // Hemen yönlendir
    window.location.href = deepLink;

    // ~2 saniye sonra hâlâ bu sayfadaysak fallback göster
    setTimeout(function () {
      if (document.visibilityState !== 'hidden') {
        document.getElementById('state-loading').style.display  = 'none';
        document.getElementById('state-fallback').style.display = 'block';
      }
    }, 2000);
  </script>
</body>
</html>
