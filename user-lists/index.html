<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vist — View Lists</title>

  <meta property="og:site_name" content="Vist" />
  <meta property="og:title" content="Check out these lists on Vist" />
  <meta property="og:description" content="Create, run and share checklists with Vist." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="https://vist.stoylab.com/assets/og-image.png" />
  <meta name="twitter:card" content="summary_large_image" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F0D0C;
      color: #F6EFE6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1A1715;
      border: 0.5px solid rgba(255,230,210,0.10);
      border-radius: 28px;
      padding: 48px 32px 40px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: rgba(255,106,61,0.15);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 30px;
    }
    h1 { font-size: 24px; font-weight: 700; letter-spacing: -0.3px; margin-bottom: 10px; }
    p { font-size: 15px; color: rgba(246,239,230,0.55); line-height: 1.55; margin-bottom: 32px; }
    .btn {
      display: block;
      background: #FF6A3D;
      color: #1A0B05;
      text-decoration: none;
      border-radius: 999px;
      padding: 17px 24px;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 12px;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.85; }
    .btn-secondary {
      display: block;
      background: rgba(255,230,210,0.07);
      color: rgba(246,239,230,0.55);
      text-decoration: none;
      border-radius: 999px;
      padding: 15px 24px;
      font-size: 15px;
      font-weight: 600;
      transition: opacity 0.15s;
    }
    .btn-secondary:active { opacity: 0.75; }
    .hint { font-size: 12px; color: rgba(246,239,230,0.28); margin-top: 20px; min-height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">👤</div>
    <h1>Opening lists…</h1>
    <p>This profile's lists will open in the Vist app.</p>
    <a href="#" class="btn" id="open-btn">Open in Vist</a>
    <a href="https://testflight.apple.com/join/N9GxmPaE" class="btn-secondary" id="install-btn" style="display:none">
      Get Vist
    </a>
    <p class="hint" id="hint"></p>
  </div>

  <script>
    var parts = window.location.pathname.replace(/\/$/, '').split('/');
    var id = parts[parts.length - 1];

    var isIOS     = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
    var isAndroid = /Android/.test(navigator.userAgent);
    var isMobile  = isIOS || isAndroid;

    if (!id || id === 'user-lists' || id === 'index.html') {
      document.getElementById('hint').textContent = 'Invalid link.';
    } else {
      var appUrl   = 'vist://user-lists/' + id;
      var storeUrl = isAndroid
        ? 'https://play.google.com/store/apps/details?id=com.stoylab.vist'
        : 'https://apps.apple.com/us/app/vist-social-checklists/id6761991890';

      document.getElementById('open-btn').href = appUrl;

      if (isMobile) {
        window.location.href = appUrl;

        setTimeout(function () {
          if (document.visibilityState !== 'hidden') {
            document.getElementById('hint').textContent =
              "Couldn't open app. Download Vist to view these lists.";
            var installBtn = document.getElementById('install-btn');
            installBtn.href = storeUrl;
            installBtn.textContent = isAndroid ? 'Get Vist on Android' : 'Get Vist on iOS';
            installBtn.style.display = 'block';
          }
        }, 2000);
      } else {
        document.querySelector('h1').textContent = 'Get the Vist app';
        document.querySelector('p').textContent =
          'Vist is available on iOS and Android. Download the app to view these lists.';
        document.getElementById('open-btn').style.display = 'none';
        var installBtn = document.getElementById('install-btn');
        installBtn.href = 'https://testflight.apple.com/join/N9GxmPaE';
        installBtn.textContent = 'Get Vist on iOS';
        installBtn.style.display = 'block';
      }
    }
  </script>
</body>
</html>
