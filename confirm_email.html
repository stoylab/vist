<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vist — Confirming Email</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F0D0C;
      color: #F6EFE6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1A1715;
      border: 0.5px solid rgba(255,230,210,0.10);
      border-radius: 28px;
      padding: 48px 32px 40px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 30px;
    }
    .icon.loading { background: rgba(255,106,61,0.14); }
    .icon.success { background: rgba(123,224,176,0.14); }
    .icon.error   { background: rgba(255,80,80,0.14); }
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(255,106,61,0.2);
      border-top-color: #FF6A3D;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      color: rgba(246,239,230,0.55);
      line-height: 1.55;
      margin-bottom: 32px;
    }
    .btn {
      display: block;
      background: #FF6A3D;
      color: #1A0B05;
      text-decoration: none;
      border-radius: 999px;
      padding: 17px 24px;
      font-weight: 700;
      font-size: 16px;
      transition: opacity 0.15s;
      cursor: pointer;
      border: none;
      width: 100%;
    }
    .btn:active { opacity: 0.85; }
    .hint {
      font-size: 12px;
      color: rgba(246,239,230,0.28);
      margin-top: 20px;
      margin-bottom: 0;
    }
    #state-loading { display: block; }
    #state-success { display: none; }
    #state-error   { display: none; }
  </style>
</head>
<body>
  <div class="card">

    <!-- Loading -->
    <div id="state-loading">
      <div class="icon loading">
        <div class="spinner"></div>
      </div>
      <h1>Confirming…</h1>
      <p>Please wait while we verify<br>your email address.</p>
    </div>

    <!-- Success -->
    <div id="state-success">
      <div class="icon success">✓</div>
      <h1>Email confirmed!</h1>
      <p>Your email has been verified.<br>Opening the Vist app now…</p>
      <a href="vist://confirmed" class="btn">Open Vist</a>
      <p class="hint" id="hint"></p>
    </div>

    <!-- Error -->
    <div id="state-error">
      <div class="icon error">✕</div>
      <h1>Link expired</h1>
      <p id="error-msg">This confirmation link is invalid or has already been used. Please request a new one from the app.</p>
    </div>

  </div>

  <script>
    const SUPABASE_URL  = 'https://lsmtkihhlshnlmxgivmk.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxzbXRraWhobHNobmxteGdpdm1rIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzUyOTcyNTUsImV4cCI6MjA5MDg3MzI1NX0.VTNyLYZ8Usw2E35u1lsaFT-z-0xvjNd-WbYw3Pg8uIM'; // ← bunu kendi anon key ile değiştir

    function show(state) {
      ['loading', 'success', 'error'].forEach(function(s) {
        document.getElementById('state-' + s).style.display = s === state ? 'block' : 'none';
      });
    }

    async function confirmEmail() {
      const params     = new URLSearchParams(window.location.search);
      const token_hash = params.get('token_hash');
      const type       = params.get('type');

      if (!token_hash || !type) {
        show('error');
        document.getElementById('error-msg').textContent =
          'Invalid confirmation link. Please request a new one from the app.';
        return;
      }

      try {
        const res = await fetch(SUPABASE_URL + '/auth/v1/verify', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
            'apikey': SUPABASE_ANON_KEY,
          },
          body: JSON.stringify({ token_hash, type }),
        });

        if (res.ok) {
          // Başarılı → /confirmed'a yönlendir
          window.location.href = '/confirmed';
        } else {
          const data = await res.json().catch(function() { return {}; });
          show('error');
          if (data && data.msg) {
            document.getElementById('error-msg').textContent = data.msg;
          }
        }
      } catch (err) {
        show('error');
        document.getElementById('error-msg').textContent =
          'Something went wrong. Please try again or contact support at vist@stoylab.com';
      }
    }

    confirmEmail();

    // Uygulama açılmazsa hint göster
    setTimeout(function () {
      var hint = document.getElementById('hint');
      if (hint && document.visibilityState !== 'hidden') {
        hint.textContent = "Tap the button above if the app didn't open automatically.";
      }
    }, 2000);
  </script>
</body>
</html>
