<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Vist — Email Confirmed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0F0D0C;
      color: #F6EFE6;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .card {
      background: #1A1715;
      border: 0.5px solid rgba(255,230,210,0.10);
      border-radius: 28px;
      padding: 48px 32px 40px;
      max-width: 380px;
      width: 100%;
      text-align: center;
    }
    .icon {
      width: 64px;
      height: 64px;
      background: rgba(123,224,176,0.14);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 30px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.3px;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      color: rgba(246,239,230,0.55);
      line-height: 1.55;
      margin-bottom: 32px;
    }
    .btn {
      display: block;
      background: #FF6A3D;
      color: #1A0B05;
      text-decoration: none;
      border-radius: 999px;
      padding: 17px 24px;
      font-weight: 700;
      font-size: 16px;
      margin-bottom: 0;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.85; }
    .hint {
      font-size: 12px;
      color: rgba(246,239,230,0.28);
      margin-top: 20px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">✓</div>
    <h1>Email confirmed!</h1>
    <p>Your email has been verified.<br>Opening the Vist app now…</p>
    <a href="vist://confirmed" class="btn" id="open-btn">Open Vist</a>
    <p class="hint" id="hint"></p>
  </div>

  <script>
    // Immediately try to open the app
    window.location.href = 'vist://confirmed';

    // If still here after 2s the app isn't installed or didn't open
    setTimeout(function () {
      if (document.visibilityState !== 'hidden') {
        document.getElementById('hint').textContent =
          "Tap the button above if the app didn't open automatically.";
      }
    }, 2000);
  </script>
</body>
</html>
